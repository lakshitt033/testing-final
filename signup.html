<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up – Skill Trace</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<nav class="navbar">
  <a class="nav-logo" href="index.html">
    <img src="logo.png" alt="Skill Trace" onerror="this.style.display='none'" />
    <span>Skill Trace</span>
  </a>
  <div class="nav-actions">
    <button class="theme-toggle">🌙</button>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo-wrap">
      <img src="logo.png" alt="Skill Trace" onerror="this.style.display='none'" />
      <span>Skill Trace</span>
    </div>
    <h2>Create Account</h2>
    <p class="subtitle">Join Skill Trace and unlock verified hiring.</p>
    <div class="role-toggle">
      <div class="role-btn active" id="role-candidate" onclick="selectRole('candidate')">
        <span class="role-icon">👤</span>
        <div class="role-name">Candidate</div>
        <div style="font-size:0.72rem;color:var(--text-muted);margin-top:3px">Find Jobs</div>
      </div>
      <div class="role-btn" id="role-recruiter" onclick="selectRole('recruiter')">
        <span class="role-icon">🏢</span>
        <div class="role-name">Recruiter</div>
        <div style="font-size:0.72rem;color:var(--text-muted);margin-top:3px">Hire Talent</div>
      </div>
    </div>
    <div id="error-msg" class="error-msg"></div>
    <div class="form-group"><label>Full Name</label><input type="text" id="signup-name" placeholder="Alex Rivera" /></div>
    <div class="form-group"><label>Email Address</label><input type="email" id="signup-email" placeholder="alex@example.com" /></div>
    <div class="form-group"><label>Password</label><input type="password" id="signup-password" placeholder="Create a strong password" /></div>
    <button class="btn btn-primary w-full" onclick="handleSignup()" style="justify-content:center;padding:12px">Create Account</button>
    <div class="auth-link">Already have an account? <a href="login.html">Sign In</a></div>
  </div>
</div>

<script src="script.js"></script>
<script>
  let selectedRole = 'candidate';
  function selectRole(role) {
    selectedRole = role;
    document.getElementById('role-candidate').classList.toggle('active', role === 'candidate');
    document.getElementById('role-recruiter').classList.toggle('active', role === 'recruiter');
  }
  function handleSignup() {
    const name = document.getElementById('signup-name').value.trim();
    const email = document.getElementById('signup-email').value.trim().toLowerCase();
    const password = document.getElementById('signup-password').value;
    const errEl = document.getElementById('error-msg');
    errEl.style.display = 'none';
    if (!name || !email || !password) { errEl.textContent = 'Please fill in all fields.'; errEl.style.display = 'block'; return; }
    if (password.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; errEl.style.display = 'block'; return; }
    if (getUserByEmail(email)) { errEl.textContent = 'An account with this email already exists.'; errEl.style.display = 'block'; return; }
    const user = { name, email, password, role: selectedRole, profile: {}, verificationStatus: 'pending' };
    const users = getUsers(); users.push(user); saveUsers(users); setCurrentUser(user);
    window.location.href = selectedRole === 'recruiter' ? 'recruiter-dashboard.html' : 'candidate-dashboard.html';
  }
</script>
</body>
</html>
